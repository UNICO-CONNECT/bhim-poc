<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BHIM UPI – Onboarding Journey</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Inter:wght@600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Driver.js CSS -->
  <link rel="stylesheet" href="driver.css" />

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Single Page App Container ===== -->
  <div id="app-container">
    <div id="phone-wrapper">
      <div id="phone-shell">
        <!-- Dynamic screens injected by journey.js -->
      </div>
      <p class="demo-disclaimer">This is only a demo. Any action here will not result in a real payment.</p>
      <div class="demo-nav">
        <button class="demo-nav__btn demo-nav__btn--prev" onclick="demoPrevious()">Previous</button>
        <button class="demo-nav__btn demo-nav__btn--home" onclick="demoHome()" aria-label="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 11.5L12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-8.5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="demo-nav__btn demo-nav__btn--next" onclick="demoNext()">Next</button>
      </div>
    </div>
  </div>

  <!-- Driver.js Library -->
  <script src="driver.js.iife.js"></script>

  <!-- Onboarding Journey Engine -->
  <script>
    document.write('<script src="journey.js?v=' + Date.now() + '"><\/script>');
  </script>

</body>
</html>
